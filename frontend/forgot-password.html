<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SunGreen Websites</title>
    <meta name="description" content="Reset your password">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a reset link</p>
        </div>
        
        <div id="alertMsg" class="msg-alert"></div>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required autocomplete="email">
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Send Reset Link</span>
                <span class="spinner"></span>
            </button>
        </form>
        
        <div class="auth-footer">
            Remembered your password? <a href="login.html">Log in</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
