<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SunGreen Websites</title>
    <meta name="description" content="Create a new account on SunGreen.">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join us today to get started.</p>
        </div>
        
        <div id="alertMsg" class="msg-alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="johndoe" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Sign Up</span>
                <span class="spinner"></span>
            </button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in here</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
