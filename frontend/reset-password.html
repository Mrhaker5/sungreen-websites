<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SunGreen Websites</title>
    <meta name="description" content="Set a new password">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#10b981">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>
        
        <div id="alertMsg" class="msg-alert"></div>

        <form id="resetPasswordForm">
            <input type="hidden" id="token" name="token">
            <input type="hidden" id="email" name="email">

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="••••••••" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Update Password</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>

    <script>
        // Extract token and email from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        if (token && email) {
            document.getElementById('token').value = token;
            document.getElementById('email').value = email;
        } else {
            const alertEl = document.getElementById('alertMsg');
            alertEl.textContent = 'Invalid or missing reset token! Please request a new link.';
            alertEl.className = 'msg-alert error';
            document.getElementById('resetPasswordForm').style.display = 'none';
        }
    </script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
