<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SunGreen Energy</title>
    <meta name="description" content="Your shopping cart">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#10b981">
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="brand">
            <img src="logo.jpeg" alt="SunGreen">
            <span>SUNGREEN</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="orders.html">My Orders</a>
            <a href="cart.html" class="cart-icon active" id="cartIconNav">🛒<span class="cart-badge" id="cartBadge" style="display:none;">0</span></a>
            <div style="position:relative;">
                <a href="#" class="cart-icon" id="notifIcon">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></a>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-dropdown-header">Notifications</div>
                    <div id="notifList"><div class="notif-item"><div class="notif-message">No notifications.</div></div></div>
                </div>
            </div>
            <div class="user-menu" id="userMenu" style="display:none;">
                <span class="user-name" id="userName"></span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Your Cart</h1>
        <div id="alertMsg" class="alert"></div>

        <div class="cart-layout" id="cartLayout" style="display:none;">
            <div class="cart-items" id="cartItems"></div>
            <div class="order-summary" id="orderSummary">
                <h3>Order Summary</h3>
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="summary-row"><span>Shipping</span><span>Free</span></div>
                <div class="summary-row total"><span>Total</span><span id="totalPrice">₹0</span></div>
                <button class="btn-checkout" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>

        <div class="empty-state" id="emptyCart">
            <h3>Your cart is empty</h3>
            <p>Browse our solar products and add items to get started.</p>
            <a href="shop.html" class="btn-primary">Continue Shopping</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="cart.js"></script>
</body>
</html>
