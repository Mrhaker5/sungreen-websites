<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - SunGreen Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand"><h2>☀️ SunGreen Admin</h2><p>Management Panel</p></div>
        <nav class="sidebar-nav">
            <a href="index.html"><span class="icon">📊</span><span>Dashboard</span></a>
            <a href="products.html" class="active"><span class="icon">📦</span><span>Products</span></a>
            <a href="orders.html"><span class="icon">🛒</span><span>Orders</span></a>
            <a href="users.html"><span class="icon">👥</span><span>Users</span></a>
            <a href="notifications.html"><span class="icon">🔔</span><span>Notifications</span></a>
        </nav>
        <div class="sidebar-footer"><button id="adminLogoutBtn">🚪 Logout</button></div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Products</h1>
            <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
        </div>
        <div id="adminAlert" class="admin-alert"></div>

        <div class="data-table-container">
            <table>
                <thead>
                    <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
                </thead>
                <tbody id="productsBody">
                    <tr><td colspan="6" style="text-align:center; color:var(--admin-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add/Edit Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <h3 id="modalTitle">Add Product</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group"><label>Name</label><input type="text" id="pName" required></div>
                <div class="form-group"><label>Price (₹)</label><input type="number" id="pPrice" step="0.01" required></div>
                <div class="form-group"><label>Description</label><textarea id="pDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="pImage" placeholder="https://..."></div>
                <div class="form-group"><label>Category</label><input type="text" id="pCategory" placeholder="Solar Panel"></div>
                <div class="form-group"><label>Stock</label><input type="number" id="pStock" value="0"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" id="closeModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="admin.js"></script>
    <script>
        if (!checkAdmin()) throw new Error('Not admin');
        initSidebar();

        const modal = document.getElementById('productModal');

        document.getElementById('addProductBtn').addEventListener('click', () => {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            modal.classList.add('open');
        });

        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

        async function loadProducts() {
            try {
                const res = await adminFetch('/products');
                const products = await res.json();
                const tbody = document.getElementById('productsBody');

                if (!Array.isArray(products) || products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--admin-muted);">No products. Click "Add Product" to start.</td></tr>';
                    return;
                }

                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td><img class="product-thumb" src="${p.image_url || 'https://via.placeholder.com/40'}" alt=""></td>
                        <td>${p.name}</td>
                        <td>${p.category || '-'}</td>
                        <td>₹${Number(p.price).toLocaleString('en-IN')}</td>
                        <td>${p.stock}</td>
                        <td>
                            <button class="btn btn-info btn-sm" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { showAdminAlert('Failed to load products'); }
        }

        window.editProduct = async function(id) {
            try {
                const res = await adminFetch(`/products/${id}`);
                const p = await res.json();
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productId').value = p.id;
                document.getElementById('pName').value = p.name;
                document.getElementById('pPrice').value = p.price;
                document.getElementById('pDesc').value = p.description || '';
                document.getElementById('pImage').value = p.image_url || '';
                document.getElementById('pCategory').value = p.category || '';
                document.getElementById('pStock').value = p.stock;
                modal.classList.add('open');
            } catch(e) { showAdminAlert('Failed to load product'); }
        };

        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product?')) return;
            try {
                await adminFetch(`/products/${id}`, { method: 'DELETE' });
                showAdminAlert('Product deleted', false);
                loadProducts();
            } catch(e) { showAdminAlert('Failed to delete'); }
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const body = {
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value),
                description: document.getElementById('pDesc').value,
                image_url: document.getElementById('pImage').value,
                category: document.getElementById('pCategory').value,
                stock: parseInt(document.getElementById('pStock').value) || 0
            };

            try {
                const res = await adminFetch(id ? `/products/${id}` : '/products', {
                    method: id ? 'PUT' : 'POST',
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    showAdminAlert(id ? 'Product updated' : 'Product added', false);
                    modal.classList.remove('open');
                    loadProducts();
                } else {
                    const data = await res.json();
                    showAdminAlert(data.error || 'Failed');
                }
            } catch(e) { showAdminAlert('Network error'); }
        });

        loadProducts();
    </script>
</body>
</html>
