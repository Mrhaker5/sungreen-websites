<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SunGreen Energy</title>
    <meta name="description" content="Complete your purchase">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#10b981">
    <link rel="stylesheet" href="shop.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="brand">
            <img src="logo.jpeg" alt="SunGreen">
            <span>SUNGREEN</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="orders.html">My Orders</a>
            <a href="cart.html" class="cart-icon" id="cartIconNav">🛒<span class="cart-badge" id="cartBadge" style="display:none;">0</span></a>
            <div class="user-menu" id="userMenu" style="display:none;">
                <span class="user-name" id="userName"></span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
            <a href="login.html" id="loginLink">Login</a>
        </div>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Checkout</h1>
        <div id="alertMsg" class="alert"></div>

        <div class="checkout-layout">
            <div class="shipping-form">
                <h3>Shipping Details</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="shippingAddress">Address</label>
                        <textarea id="shippingAddress" rows="3" placeholder="Full shipping address" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="shippingCity">City</label>
                            <input type="text" id="shippingCity" placeholder="Ranchi" required>
                        </div>
                        <div class="form-group">
                            <label for="shippingPincode">Pincode</label>
                            <input type="text" id="shippingPincode" placeholder="834001" maxlength="6" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="shippingPhone">Phone Number</label>
                        <input type="tel" id="shippingPhone" placeholder="+91 9876543210" required>
                    </div>
                    <button type="submit" class="btn-pay" id="payBtn">
                        💳 Pay with Razorpay
                    </button>
                </form>
            </div>

            <div class="order-summary" id="checkoutSummary">
                <h3>Order Summary</h3>
                <div id="checkoutItems"></div>
                <div class="summary-row" style="margin-top:1rem;"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="summary-row"><span>Shipping</span><span>Free</span></div>
                <div class="summary-row total"><span>Total</span><span id="totalPrice">₹0</span></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
